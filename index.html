  <meta name="theme-color" content="#09090B">
  <meta property="og:title" content="Latent Space">
  <meta property="og:description" content="An interactive 3D collection. Drag to orbit, scroll to zoom, click to explore.">
  <meta property="og:type" content="website">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:;">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    /* ========================================
       RESET
    ======================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

    /* ========================================
       CUSTOM PROPERTIES
    ======================================== */
    :root {
      --ink: #09090B;
      --graphite: #18181B;
      --carbon: #1C1C1E;
      --pewter: #71717A;
      --linen: #F5F5F0;
      --gallery-white: #FAFAF9;
      --gold: #B8964E;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ========================================
       BASE
    ======================================== */
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--ink);
      color: var(--gallery-white);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }
    body.cursor-ready { cursor: none; }

    /* ========================================
       CUSTOM CURSOR
    ======================================== */
    .cursor-dot {
      position: fixed;
      top: 0;
      left: 0;
      width: 6px;
      height: 6px;
      background: var(--gallery-white);
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      will-change: transform;
    }
    .cursor-ring {
      position: fixed;
      top: 0;
      left: 0;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(250,250,249,0.3);
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      will-change: transform;
      transition: width 0.25s ease, height 0.25s ease, border-color 0.25s ease;
    }
    .cursor-ring.hovering {
      width: 56px;
      height: 56px;
      border-color: var(--gold);
    }

    /* ========================================
       LOADING SCREEN
    ======================================== */
    #loader {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .loader-overline {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--pewter);
      margin-bottom: 1.5rem;
    }
    .loader-title {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(2rem, 5vw, 3.5rem);
      color: var(--gallery-white);
      letter-spacing: -0.02em;
      margin-bottom: 3rem;
      animation: loaderPulse 2.5s ease-in-out infinite;
    }
    @keyframes loaderPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .loader-bar {
      width: 160px;
      height: 1px;
      background: rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }
    .loader-fill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0%;
      background: var(--gold);
      transition: width 0.3s ease;
    }
    .loader-pct {
      font-family: var(--font-body);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--pewter);
      margin-top: 1rem;
    }

    /* ========================================
       CANVAS
    ======================================== */
    #canvas-wrap {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    #canvas-wrap canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ========================================
       UI OVERLAY
    ======================================== */
    #ui-overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }
    #ui-overlay > * {
      pointer-events: auto;
    }

    /* Title — top left */
    .title-bar {
      position: fixed;
      top: 2.5rem;
      left: 2.5rem;
      z-index: 20;
    }
    .title-bar .overline {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--pewter);
      margin-bottom: 0.35rem;
    }
    .title-bar h1 {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: 1.4rem;
      letter-spacing: -0.01em;
      color: var(--gallery-white);
    }

    /* Count — top right */
    .image-count {
      position: fixed;
      top: 2.5rem;
      right: 2.5rem;
      z-index: 20;
      text-align: right;
    }
    .image-count .number {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: 1.4rem;
      color: var(--gallery-white);
    }
    .image-count .label {
      font-family: var(--font-body);
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--pewter);
      margin-top: 0.15rem;
    }

    /* View toggle — bottom center */
    .view-toggle {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      gap: 0;
      border: 1px solid rgba(184,150,78,0.25);
    }
    .view-toggle button {
      background: transparent;
      color: var(--pewter);
      border: none;
      padding: 0.6rem 1.5rem;
      font-family: var(--font-body);
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: none;
      transition: color 0.3s ease, background 0.3s ease;
    }
    .view-toggle button + button {
      border-left: 1px solid rgba(184,150,78,0.15);
    }
    .view-toggle button.active {
      color: var(--gold);
      background: rgba(184,150,78,0.08);
    }
    .view-toggle button:hover {
      color: var(--gold);
    }
    .view-toggle button:focus-visible {
      outline: 1px solid var(--gold);
      outline-offset: -1px;
    }

    /* Zoom hint — bottom right */
    .zoom-hint {
      position: fixed;
      bottom: 2.5rem;
      right: 2.5rem;
      z-index: 20;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(113,113,122,0.5);
      opacity: 1;
      transition: opacity 0.6s ease;
    }
    .zoom-hint.faded { opacity: 0; }

    /* FPS — bottom left */
    .fps-counter {
      position: fixed;
      bottom: 2.5rem;
      left: 2.5rem;
      z-index: 20;
      font-family: var(--font-body);
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      color: rgba(113,113,122,0.4);
      display: none;
    }
    .fps-counter.visible { display: block; }

    /* ========================================
       CARD OVERLAY
    ======================================== */
    #card-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(9,9,11,0.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease, visibility 0.5s ease;
      cursor: none;
    }
    #card-overlay.visible {
      opacity: 1;
      visibility: visible;
    }
    #card-overlay img {
      max-width: 75vw;
      max-height: 75vh;
      object-fit: contain;
      opacity: 0;
      transform: scale(0.95);
      transition: opacity 0.5s ease 0.1s, transform 0.5s ease 0.1s;
    }
    #card-overlay.visible img {
      opacity: 1;
      transform: scale(1);
    }
    .overlay-meta {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      display: flex;
      gap: 2rem;
      align-items: center;
    }
    .overlay-meta span {
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--pewter);
    }
    .overlay-close {
      position: absolute;
      top: 2.5rem;
      right: 2.5rem;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--pewter);
      cursor: none;
      background: none;
      border: none;
      font-family: var(--font-body);
      transition: color 0.3s ease;
    }
    .overlay-close:hover { color: var(--gallery-white); }
    .overlay-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--pewter);
      font-size: 1.2rem;
      width: 3rem;
      height: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: none;
      font-family: var(--font-body);
      transition: color 0.3s ease, border-color 0.3s ease;
    }
    .overlay-nav:hover {
      color: var(--gallery-white);
      border-color: var(--gold);
    }
    .overlay-nav:focus-visible {
      outline: 1px solid var(--gold);
      outline-offset: 2px;
    }
    .overlay-prev { left: 2.5rem; }
    .overlay-next { right: 2.5rem; }

    /* ========================================
       BACKGROUND NOISE TEXTURE
    ======================================== */
    .bg-noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }

    /* ========================================
       BACKGROUND ATMOSPHERE
    ======================================== */
    .bg-atmosphere {
      position: fixed;
      top: -10%;
      left: -10%;
      width: 120%;
      height: 120%;
      z-index: 0;
      pointer-events: none;
      background: url('images/bg-atmosphere.webp') center center / cover no-repeat;
      opacity: 0.18;
      will-change: transform;
    }

    /* ========================================
       SCREEN VIGNETTE
    ======================================== */
    .screen-vignette {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(9,9,11,0.7) 100%);
    }

    /* ========================================
       RESPONSIVE
    ======================================== */
    @media (max-width: 768px) {
      html, body { cursor: auto; }
      .cursor-dot, .cursor-ring { display: none; }
      .title-bar { top: 1rem; left: 1rem; }
      .title-bar h1 { font-size: 1.1rem; }
      .title-bar .overline { font-size: 0.5rem; }
      .image-count { top: 1rem; right: 1rem; }
      .image-count .number { font-size: 1.1rem; }
      .view-toggle { bottom: 1rem; }
      .view-toggle button { padding: 0.5rem 1rem; font-size: 0.55rem; cursor: pointer; }
      .zoom-hint { display: none; }
      .overlay-close { cursor: pointer; top: 1rem; right: 1rem; }
      .overlay-nav { cursor: pointer; width: 2.5rem; height: 2.5rem; }
      .overlay-prev { left: 0.75rem; }
      .overlay-next { right: 0.75rem; }
      #card-overlay img { max-width: 92vw; max-height: 70vh; }
      .screen-vignette { background: radial-gradient(ellipse at center, transparent 30%, rgba(9,9,11,0.8) 100%); }
    }

    @media (max-width: 480px) {
      .title-bar h1 { font-size: 0.9rem; }
      .image-count .number { font-size: 0.9rem; }
      .view-toggle button { padding: 0.4rem 0.8rem; }
    }

    /* ========================================
       EASTER EGG MODES
    ======================================== */
    body.gold-mode #canvas-wrap {
      filter: sepia(0.3) saturate(1.5) brightness(1.1);
      transition: filter 0.6s ease;
    }
    body.invert-mode {
      background: var(--gallery-white);
    }
    body.invert-mode #canvas-wrap {
      filter: invert(1) hue-rotate(180deg);
      transition: filter 0.6s ease;
    }
    body.invert-mode .title-bar h1,
    body.invert-mode .image-count .number { color: var(--ink); }
    body.invert-mode .title-bar .overline,
    body.invert-mode .image-count .label,
    body.invert-mode .overlay-meta span { color: var(--carbon); }

    /* ========================================
       REDUCED MOTION
    ======================================== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

    // ========================================
    // 3. FIBONACCI SPHERE
    // ========================================
    function fibSphere(i, total, r) {
      var golden = Math.PI * (3 - Math.sqrt(5));
      var y = 1 - (i / (total - 1)) * 2;
      var rAtY = Math.sqrt(1 - y * y);
      var theta = golden * i;
      return new THREE.Vector3(
        Math.cos(theta) * rAtY * r,
        y * r,
        Math.sin(theta) * rAtY * r
      );
    }

    // ========================================
    // 4. GRID POSITIONS
    // ========================================
    function gridPos(i, total) {
      var cols = Math.ceil(Math.sqrt(total * 1.6));
      var spacingX = CARD_W * 1.2;
      var spacingY = CARD_H * 1.25;
      var col = i % cols;
      var row = Math.floor(i / cols);
      var rows = Math.ceil(total / cols);
      var ox = -(cols - 1) * spacingX * 0.5;
      var oy = (rows - 1) * spacingY * 0.5;
      // Stagger odd rows for masonry feel
      var stagger = (row % 2 === 1) ? spacingX * 0.4 : 0;
      return new THREE.Vector3(
        ox + col * spacingX + stagger,
        oy - row * spacingY,
        0
      );
    }

    var liquidVertexShader = [
      'uniform float uTime;',
      'uniform float uHover;',
      'varying vec2 vUv;',
      'varying vec3 vWorldPos;',
      '',
      'void main() {',
      '  vUv = uv;',
      '  // Subtle vertex displacement — organic breathing',
      '  vec3 pos = position;',
      '  float wave = sin(pos.x * 4.0 + uTime * 0.8) * cos(pos.y * 3.0 + uTime * 0.6);',
      '  pos.z += wave * 0.05 * (0.2 + uHover * 0.8);',
      '  vec4 worldPos = modelMatrix * vec4(pos, 1.0);',
      '  vWorldPos = worldPos.xyz;',
      '  gl_Position = projectionMatrix * viewMatrix * worldPos;',
      '}'
    ].join('\n');

    var liquidFragmentShader = [
      'uniform sampler2D uTexture;',
      'uniform float uTime;',
      'uniform float uHover;',
      'uniform float uDistortion;',
      'uniform vec3 fogColor;',
      'uniform float fogDensity;',
      'varying vec2 vUv;',
      'varying vec3 vWorldPos;',
      '',
      '// Simple hash for grain',
      'float hash(vec2 p) {',
      '  return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);',
      '}',
      '',
      'void main() {',
      '  vec2 uv = vUv;',
      '',
      '  // Ambient micro-drift (always active, very subtle)',
      '  float drift = sin(uv.y * 6.0 + uTime * 0.4) * 0.002;',
      '  uv.x += drift;',
      '',
      '  // Liquid ripple on hover',
      '  float dist = length(uv - 0.5);',
      '  float ripple = sin(dist * 10.0 - uTime * 4.0) * 0.04 * uHover;',
      '  float wave = sin(uv.y * 8.0 + uTime * 2.5) * 0.025 * uHover;',
      '  float swirl = sin(uv.x * 6.0 - uTime * 2.0) * 0.015 * uHover;',
      '  uv.x += ripple + wave;',
      '  uv.y += ripple * 0.7 + swirl;',
      '',
      '  // Chromatic aberration — stronger on hover',
      '  float shift = 0.002 + 0.008 * uHover;',
      '  float r = texture2D(uTexture, uv + vec2(shift, 0.0)).r;',
      '  float g = texture2D(uTexture, uv).g;',
      '  float b = texture2D(uTexture, uv - vec2(shift, 0.0)).b;',
      '  float a = texture2D(uTexture, uv).a;',
      '',
      '  vec3 col = vec3(r, g, b);',
      '',
      '  // Brightness + contrast boost on hover',
      '  col *= 1.0 + 0.12 * uHover;',
      '  col = mix(col, col * col * (3.0 - 2.0 * col), 0.08 * uHover);',
      '',
      '  // Edge glow — gold tint at card edges on hover',
      '  float edge = smoothstep(0.0, 0.15, min(min(uv.x, 1.0 - uv.x), min(uv.y, 1.0 - uv.y)));',
      '  vec3 goldGlow = vec3(0.722, 0.588, 0.306) * (1.0 - edge) * 0.3 * uHover;',
      '  col += goldGlow;',
      '',
      '  // Film grain — subtle, always present',
      '  float grain = (hash(uv * 500.0 + fract(uTime)) - 0.5) * 0.04;',
      '  col += grain;',
      '',
      '  // Vignette per card',
      '  float vig = 1.0 - dot((uv - 0.5) * 1.2, (uv - 0.5) * 1.2);',
      '  col *= smoothstep(0.0, 0.6, vig);',
      '',
      '  // Fog',
      '  float depth = gl_FragCoord.z / gl_FragCoord.w;',
      '  float fogFactor = 1.0 - exp(-fogDensity * fogDensity * depth * depth);',
      '  col = mix(col, fogColor, fogFactor);',
      '',
      '  gl_FragColor = vec4(col, a);',
      '}'
    ].join('\n');

      globeGroup = new THREE.Group();
      scene.add(globeGroup);

      // Wireframe globe skeleton with vertex color shimmer
      var wireGeo = new THREE.IcosahedronGeometry(GLOBE_RADIUS * 0.98, 3);
      var wireVertCount = wireGeo.attributes.position.count;
      var wireColors = new Float32Array(wireVertCount * 3);
      for (var wv = 0; wv < wireVertCount; wv++) {
        // Base gold with per-vertex variation for shimmer
        wireColors[wv * 3]     = 0.722 + (Math.random() - 0.5) * 0.15;
        wireColors[wv * 3 + 1] = 0.588 + (Math.random() - 0.5) * 0.12;
        wireColors[wv * 3 + 2] = 0.306 + (Math.random() - 0.5) * 0.08;
      }
      wireGeo.setAttribute('color', new THREE.BufferAttribute(wireColors, 3));
      var wireMat = new THREE.MeshBasicMaterial({
        vertexColors: true,

        transparent: true,

        depthWrite: false

      wireframeGlobe.userData.colors = wireColors;
      wireframeGlobe.userData.vertCount = wireVertCount;
      globeGroup.add(wireframeGlobe);

      initParticles();
    }

          '}'
        ].join('\n'),
        fragmentShader: [
          'uniform float uTime;',
          'uniform vec3 uColor;',
          'varying vec3 vNormal;',
          'varying vec3 vPosition;',
          'void main() {',
          '  // Fresnel — brighter at edges, transparent at center',
          '  float fresnel = 1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0)));',
          '  fresnel = pow(fresnel, 2.0);',
          '  // Pulse',
          '  float pulse = 0.7 + 0.3 * sin(uTime * 0.5);',
          '  float alpha = fresnel * 0.12 * pulse;',
          '  gl_FragColor = vec4(uColor, alpha);',
          '}'
        ].join('\n')
      });
      coreGlow = new THREE.Mesh(coreGeo, coreMat);
      globeGroup.add(coreGlow);

      // Add a PointLight at center for actual illumination of cards
      var coreLight = new THREE.PointLight(0xB8964E, 0.6, GLOBE_RADIUS * 2.5, 2);
      coreLight.position.set(0, 0, 0);
      globeGroup.add(coreLight);
      window._coreLight = coreLight;
    }

    // ========================================
    // 7. AMBIENT PARTICLES
    // ========================================
    function initParticles() {
      var geo = new THREE.BufferGeometry();
      var positions = new Float32Array(PARTICLE_COUNT * 3);
      var alphas = new Float32Array(PARTICLE_COUNT);
      for (var i = 0; i < PARTICLE_COUNT; i++) {
        positions[i * 3]     = (Math.random() - 0.5) * 30;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 30;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 30;
        alphas[i] = Math.random() * 0.4 + 0.1;
      }
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geo.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));

      var mat = new THREE.PointsMaterial({
        color: 0xFAFAF9,
        size: 0.03,
        transparent: true,
        opacity: 0.35,
        sizeAttenuation: true,
        depthWrite: false
      });
      particleSystem = new THREE.Points(geo, mat);
      scene.add(particleSystem);

      // Second particle layer — gold dust, smaller, closer
      var goldGeo = new THREE.BufferGeometry();
      var goldCount = 120;
      var goldPos = new Float32Array(goldCount * 3);
      for (var gi = 0; gi < goldCount; gi++) {
        goldPos[gi * 3]     = (Math.random() - 0.5) * 20;
        goldPos[gi * 3 + 1] = (Math.random() - 0.5) * 20;
        goldPos[gi * 3 + 2] = (Math.random() - 0.5) * 20;
      }
      goldGeo.setAttribute('position', new THREE.BufferAttribute(goldPos, 3));
      var goldMat = new THREE.PointsMaterial({
        color: 0xB8964E,
        size: 0.025,
        transparent: true,
        opacity: 0.25,
        sizeAttenuation: true,
        depthWrite: false
      });
      var goldParticles = new THREE.Points(goldGeo, goldMat);
      goldParticles.userData.positions = goldPos;
      goldParticles.userData.count = goldCount;
      scene.add(goldParticles);
      window._goldParticles = goldParticles;
    }

    function updateParticles(time) {
      var pos = particleSystem.geometry.attributes.position.array;
      for (var i = 0; i < PARTICLE_COUNT; i++) {
        var idx = i * 3;
        var seed = i * 0.137;
        // Multi-frequency organic drift (curl-like without full curl noise)
        pos[idx]     += Math.cos(time * 0.3 + seed * 7.1) * 0.0008 + Math.sin(time * 0.7 + seed * 3.3) * 0.0003;
        pos[idx + 1] += Math.sin(time * 0.2 + seed * 5.3) * 0.001 + Math.cos(time * 0.5 + seed * 2.1) * 0.0004;
        pos[idx + 2] += Math.sin(time * 0.4 + seed * 4.7) * 0.0005;
        // Wrap particles that drift too far
        if (Math.abs(pos[idx]) > 16) pos[idx] *= -0.8;
        if (Math.abs(pos[idx + 1]) > 16) pos[idx + 1] *= -0.8;
        if (Math.abs(pos[idx + 2]) > 16) pos[idx + 2] *= -0.8;
      }
      particleSystem.geometry.attributes.position.needsUpdate = true;
      particleSystem.rotation.y = time * 0.008;

      // Gold dust layer — slower, dreamier drift
      var gp = window._goldParticles;
      if (gp) {
        var gpos = gp.userData.positions;
        var gc = gp.userData.count;
        for (var gi = 0; gi < gc; gi++) {
          var gidx = gi * 3;
          var gseed = gi * 0.219;
          gpos[gidx]     += Math.sin(time * 0.15 + gseed * 4.3) * 0.0006;
          gpos[gidx + 1] += Math.cos(time * 0.1 + gseed * 3.1) * 0.0008;
          gpos[gidx + 2] += Math.sin(time * 0.2 + gseed * 5.7) * 0.0004;
          if (Math.abs(gpos[gidx]) > 12) gpos[gidx] *= -0.7;
          if (Math.abs(gpos[gidx + 1]) > 12) gpos[gidx + 1] *= -0.7;
          if (Math.abs(gpos[gidx + 2]) > 12) gpos[gidx + 2] *= -0.7;
        }
        gp.geometry.attributes.position.needsUpdate = true;
        gp.rotation.y = -time * 0.005;
      }
    }

    // ========================================
    // 8. LOAD IMAGES AS SHADER CARDS
    // ========================================
    var BATCH_SIZE = 10;
    var loadQueue = [];
    var activeLoads = 0;
    var introTriggered = false;

    function loadNextBatch() {
      while (activeLoads < BATCH_SIZE && loadQueue.length > 0) {
        var item = loadQueue.shift();
        activeLoads++;
        loadSingleImage(item.src, item.i, item.total, item.loader);
      }
    }

    function onImageLoaded() {
      activeLoads--;
      loadedCount++;
      var total = IMAGES.length;
      var pct = Math.round((loadedCount / total) * 100);
      document.getElementById('loader-fill').style.width = pct + '%';
      document.getElementById('loader-pct').textContent = pct + '%';

      // Show globe after just 5 images — don't wait for all 137
      if (!introTriggered && loadedCount >= 5) {
        introTriggered = true;
        onAllLoaded();
      }
      // Reveal late-arriving cards immediately after intro
      if (introTriggered && cards.length > 0) {
        var latest = cards[cards.length - 1];
        if (latest && latest.userData.targetScale < 1) {
          latest.userData.targetScale = 1;
          latest.userData.revealDelay = performance.now();
        }
      }
      loadNextBatch();
    }

    function loadCards() {
      var textureLoader = new THREE.TextureLoader();
      var total = IMAGES.length;

      document.getElementById('count-number').textContent = total;

      // Queue all, load in batches
      for (var qi = 0; qi < total; qi++) {
        loadQueue.push({ src: IMAGES[qi], i: qi, total: total, loader: textureLoader });
      }
      loadNextBatch();
    }

    function loadSingleImage(src, i, total, textureLoader) {
      textureLoader.load(src, function(texture) {
          texture.encoding = THREE.sRGBEncoding;
          texture.minFilter = THREE.LinearFilter;
          texture.magFilter = THREE.LinearFilter;

          var aspect = texture.image.width / texture.image.height;
          var w = CARD_W;
          var h = CARD_H;
          if (aspect > 1.2) { h = w / aspect; }
          else if (aspect < 0.8) { w = h * aspect; }

          var geo = new THREE.PlaneGeometry(w, h, 1, 1);

          // Shader material with liquid distortion
          var mat = new THREE.ShaderMaterial({
            uniforms: {
              uTexture: { value: texture },
              uTime: { value: 0 },
              uHover: { value: 0 },
              uDistortion: { value: 0 },
              fogColor: { value: new THREE.Color(0x09090B) },
              fogDensity: { value: 0.018 }
            },
            vertexShader: liquidVertexShader,
            fragmentShader: liquidFragmentShader,
            side: THREE.DoubleSide,
            transparent: true
          });

          var mesh = new THREE.Mesh(geo, mat);

          // Thin gold border — slightly larger plane behind the card
          var borderGeo = new THREE.PlaneGeometry(w + 0.03, h + 0.03);
          var borderMat = new THREE.MeshBasicMaterial({
            color: 0xB8964E,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.15,
            depthWrite: false
          });
          var border = new THREE.Mesh(borderGeo, borderMat);
          border.position.z = -0.005;
          mesh.add(border);

          // Globe position via Fibonacci
          var gp = fibSphere(i, total, GLOBE_RADIUS);
          mesh.position.copy(gp);
          mesh.lookAt(0, 0, 0);
          mesh.rotateY(Math.PI);

          // Unique per-card rotation offset for "hand-placed" feel
          var uniqueAngle = (Math.random() - 0.5) * 0.12;
          mesh.rotateZ(uniqueAngle);

          mesh.userData = {
            index: i,
            src: src,
            globePos: gp.clone(),
            globeQuat: mesh.quaternion.clone(),
            gridPos: gridPos(i, total),
            gridQuat: new THREE.Quaternion(),
            uniqueAngle: uniqueAngle,
            breathOffset: Math.random() * Math.PI * 2,
            breathSpeed: 0.3 + Math.random() * 0.4
          };

          mesh.material.uniforms.uHover.value = 0;
          mesh.scale.set(0.001, 0.001, 0.001);

          // Animation targets (lerped in render loop, no GSAP dependency)
          mesh.userData.targetScale = 0.001;
          mesh.userData.currentScale = 0.001;
          mesh.userData.targetHover = 0;
          mesh.userData.currentHover = 0;
          mesh.userData.revealDelay = 0; // set in onAllLoaded
          mesh.userData.revealTime = 0;

          cards.push(mesh);
          globeGroup.add(mesh);

          onImageLoaded();
        }, undefined, function() {
          onImageLoaded();
        });
    }

    // ========================================
    // 9. INTRO SEQUENCE
    // ========================================
    function onAllLoaded() {
      // Hide UI initially
      var uiEls = ['title-bar', 'image-count', 'view-toggle', 'zoom-hint'];
      uiEls.forEach(function(id) {
        var el = document.getElementById(id);
        el.style.opacity = '0';
        el.style.transition = 'opacity 1.2s ease';
      });

      // PHASE 1 — Grid flickers in darkness (1s)
      setTimeout(function() {
        document.getElementById('loader').classList.add('hidden');
        targetZoom = 18;
        document.getElementById('title-bar').style.opacity = '1';
      }, 200);

      // PHASE 2 — Cards materialize fast (1.2s after loader)
      setTimeout(function() {
        targetZoom = 16;

        var sorted = cards.slice().sort(function(a, b) {
          return Math.abs(b.userData.globePos.y) - Math.abs(a.userData.globePos.y);
        });

        var revealStart = performance.now();
        sorted.forEach(function(card, i) {
          card.userData.targetScale = 1;
          card.userData.revealDelay = revealStart + i * 20;
        });

        document.getElementById('image-count').style.opacity = '1';
        setTimeout(function() {
          document.getElementById('view-toggle').style.opacity = '1';
        }, 400);
        setTimeout(function() {
          document.getElementById('zoom-hint').style.opacity = '1';
        }, 800);

        introPlayed = true;

        setTimeout(function() {
          document.getElementById('zoom-hint').classList.add('faded');
        }, 5000);
      }, 1200);
    }

    // ========================================
    // 10. VIEW MORPHING
    // ========================================
    function morphTo(view) {
      if (isTransitioning || view === currentView) return;
      isTransitioning = true;
      currentView = view;

      var isGlobe = view === 'globe';
      autoSpeed = isGlobe ? AUTO_ROTATE : 0;
      targetZoom = isGlobe ? 16 : 12;

      // Set morph targets on each card
      cards.forEach(function(card, i) {
        var d = card.userData;
        var tp = isGlobe ? d.globePos : d.gridPos;
        var tq = isGlobe ? d.globeQuat : d.gridQuat;
        d.morphTarget = tp.clone();
        d.morphQuat = tq.clone();
        d.morphStartQuat = card.quaternion.clone();
        d.morphT = 0;
        d.morphDelay = performance.now() + Math.random() * 300;
      });

      // Reset globe rotation target
      morphingGlobeRotation = true;

      setTimeout(function() {
        isTransitioning = false;
        morphingGlobeRotation = false;
      }, 2000);
    }

    // ========================================
    // 11. INTERACTION
    // ========================================
    function onPointerDown(e) {
      isDragging = true;
      prevMX = e.clientX;
      prevMY = e.clientY;
      autoSpeed = 0;
    }

    function onPointerMove(e) {
      cursorX = e.clientX;
      cursorY = e.clientY;
      _mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      _mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

      // Mouse parallax targets
      targetParallaxX = _mouse.x * 0.3;
      targetParallaxY = _mouse.y * 0.15;

      if (isDragging && currentView === 'globe') {
        velY = (e.clientX - prevMX) * 0.004;
        velX = (e.clientY - prevMY) * 0.004;
        prevMX = e.clientX;
        prevMY = e.clientY;
      }
    }

    function onPointerUp() {
      isDragging = false;
      if (currentView === 'globe') {
        setTimeout(function() {
          if (!isDragging) autoSpeed = AUTO_ROTATE;
        }, 2500);
      }
    }

    function onWheel(e) {
      e.preventDefault();
      targetZoom += e.deltaY * 0.005;
      targetZoom = Math.max(8, Math.min(30, targetZoom));
    }

    function onClick(e) {
      if (!introPlayed || isTransitioning) return;
      _raycaster.setFromCamera(_mouse, camera);
      var hits = _raycaster.intersectObjects(cards);
      if (hits.length > 0) {
        showOverlay(hits[0].object.userData);
      }
    }

    // ========================================
    // 12. OVERLAY
    // ========================================
    function showOverlay(data) {
      overlayIndex = data.index;
      var overlay = document.getElementById('card-overlay');
      document.getElementById('overlay-img').src = data.src;
      document.getElementById('overlay-index').textContent =
        (overlayIndex + 1) + ' / ' + IMAGES.length;
      overlay.classList.add('visible');
    }

    function hideOverlay() {
      document.getElementById('card-overlay').classList.remove('visible');
      overlayIndex = -1;
    }

    function navigateOverlay(dir) {
      if (overlayIndex < 0) return;
      overlayIndex = (overlayIndex + dir + IMAGES.length) % IMAGES.length;
      var img = document.getElementById('overlay-img');
      // Crossfade transition
      img.style.transition = 'opacity 0.2s ease';
      img.style.opacity = '0';
      setTimeout(function() {
        img.src = IMAGES[overlayIndex];
        img.onload = function() {
          img.style.opacity = '1';
          img.onload = null;
        };
      }, 200);
      document.getElementById('overlay-index').textContent =
        (overlayIndex + 1) + ' / ' + IMAGES.length;
    }

    // ========================================
    // 13. RENDER LOOP
    // ========================================
    var frames = 0, fpsTime = 0;

    function animate() {
      requestAnimationFrame(animate);

      var delta = clock.getDelta();
      var time = clock.elapsedTime;

      // FPS counter
      frames++;
      fpsTime += delta;
      if (fpsTime >= 1) {
        if (showFPS) {
          document.getElementById('fps-counter').textContent = frames + ' FPS';
        }
        frames = 0;
        fpsTime = 0;
      }

      // Smooth zoom
      currentZoom += (targetZoom - currentZoom) * 0.07;
      camera.position.z = currentZoom;

      // Mouse parallax — subtle scene tilt
      parallaxX += (targetParallaxX - parallaxX) * 0.03;
      parallaxY += (targetParallaxY - parallaxY) * 0.03;
      camera.position.x = parallaxX;
      camera.position.y = parallaxY;

      if (currentView === 'globe') {
        // Auto-rotate
        globeGroup.rotation.y += autoSpeed;

        // Globe breathing — subtle scale pulse
        var breathScale = 1.0 + Math.sin(time * 0.3) * 0.008;
        globeGroup.scale.set(breathScale, breathScale, breathScale);

        // Drag — apply always, dampen on release
        globeGroup.rotation.y += velY;
        globeGroup.rotation.x += velX;
        if (!isDragging) {
          velY *= DAMPING;
          velX *= DAMPING;
        }

        // Card breathing — multi-frequency organic float
        if (!isTransitioning) {
          for (var i = 0; i < cards.length; i++) {
            var c = cards[i];
            var d = c.userData;
            var t1 = time * d.breathSpeed + d.breathOffset;
            var t2 = time * d.breathSpeed * 0.7 + d.breathOffset * 1.3;
            var breathY = Math.sin(t1) * 0.05 + Math.sin(t2 * 1.6) * 0.02;
            var breathX = Math.cos(t1 * 0.8) * 0.03;
            var breathZ = Math.sin(t2) * 0.02;
            c.position.x = d.globePos.x + breathX;
            c.position.y = d.globePos.y + breathY;
            c.position.z = d.globePos.z + breathZ;
          }
        }
      }

      // Lerp globe rotation toward zero during morph
      if (morphingGlobeRotation) {
        globeGroup.rotation.x += (0 - globeGroup.rotation.x) * 0.06;
        globeGroup.rotation.y += (0 - globeGroup.rotation.y) * 0.06;
        globeGroup.rotation.z += (0 - globeGroup.rotation.z) * 0.06;
      }

      // Morph card positions/quaternions toward targets
      if (isTransitioning) {
        for (var m = 0; m < cards.length; m++) {
          var mc = cards[m];
          var md = mc.userData;
          if (md.morphTarget && performance.now() >= md.morphDelay) {
            md.morphT = Math.min(md.morphT + 0.04, 1);
            mc.position.lerp(md.morphTarget, 0.06);
            mc.quaternion.slerp(md.morphQuat, 0.06);
          }
        }
      }

      // Lerp scale, hover, and update shader uniforms
      var now = performance.now();
      for (var j = 0; j < cards.length; j++) {
        var c = cards[j];
        var d = c.userData;

        // Staggered reveal — don't start lerping until delay passed
        if (now >= d.revealDelay && d.targetScale > d.currentScale) {
          d.currentScale += (d.targetScale - d.currentScale) * 0.08;
          if (d.targetScale - d.currentScale < 0.001) d.currentScale = d.targetScale;
        }

        // Hover lerp
        d.currentHover += (d.targetHover - d.currentHover) * 0.1;

        c.scale.set(d.currentScale, d.currentScale, d.currentScale);
        c.material.uniforms.uHover.value = d.currentHover;
        c.material.uniforms.uTime.value = time;
        // Brighten gold border on hover
        if (c.children[0]) {
          c.children[0].material.opacity = 0.1 + d.currentHover * 0.4;
        }
      }

      // Hover detection
      _raycaster.setFromCamera(_mouse, camera);
      var intersects = _raycaster.intersectObjects(cards);

      if (hoveredCard && (!intersects.length || intersects[0].object !== hoveredCard)) {
        hoveredCard.userData.targetScale = 1;
        hoveredCard.userData.targetHover = 0;
        cursorRing.classList.remove('hovering');
        hoveredCard = null;
      }

      if (intersects.length > 0 && !isTransitioning && introPlayed) {
        var target = intersects[0].object;
        if (target !== hoveredCard) {
          hoveredCard = target;
          hoveredCard.userData.targetScale = 1.25;
          hoveredCard.userData.targetHover = 1;
          cursorRing.classList.add('hovering');
        }
      }

      // Wireframe globe — gold flicker shimmer
      if (wireframeGlobe) {
        var wc = wireframeGlobe.userData.colors;
        var wn = wireframeGlobe.userData.vertCount;
        // Flicker ~8% of vertices per frame toward bright gold, rest decay
        for (var wi = 0; wi < wn; wi++) {
          var ci = wi * 3;
          var flicker = Math.sin(time * 3.0 + wi * 0.73) * Math.cos(time * 1.7 + wi * 1.31);
          if (flicker > 0.85) {
            // Bright gold spike
            wc[ci]     = Math.min(1.0, wc[ci] + 0.08);
            wc[ci + 1] = Math.min(0.85, wc[ci + 1] + 0.06);
            wc[ci + 2] = Math.min(0.55, wc[ci + 2] + 0.04);
          } else {
            // Decay back to base gold
            wc[ci]     += (0.722 - wc[ci]) * 0.04;
            wc[ci + 1] += (0.588 - wc[ci + 1]) * 0.04;
            wc[ci + 2] += (0.306 - wc[ci + 2]) * 0.04;
          }
        }
        wireframeGlobe.geometry.attributes.color.needsUpdate = true;
        wireframeGlobe.material.opacity = 0.05 + Math.sin(time * 0.4) * 0.025;
        wireframeGlobe.rotation.y = time * 0.015;
        wireframeGlobe.rotation.x = Math.sin(time * 0.12) * 0.04;
      }


      // Particles
      updateParticles(time);

      renderer.render(scene, camera);
    }

    // ========================================
    // 14. RESIZE
    // ========================================
    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // ========================================
    // 15. VIEW TOGGLE
    // ========================================
    function initViewToggle() {
      var btns = document.querySelectorAll('.view-toggle button');
      btns.forEach(function(btn) {
        btn.addEventListener('click', function() {
          var v = this.getAttribute('data-view');
          btns.forEach(function(b) { b.classList.remove('active'); });
          this.classList.add('active');
          morphTo(v);
        });
      });
    }

    // ========================================
    // 16. KEYBOARD + EASTER EGGS
    // ========================================
    var konamiSeq = [38,38,40,40,37,39,37,39,66,65];
    var konamiIdx = 0;
    var typedBuffer = '';
    var goldMode = false;

    function resetAllModes() {
      goldMode = false;
      document.body.classList.remove('gold-mode', 'invert-mode');
    }

    function triggerGoldMode() {
      resetAllModes();
      goldMode = true;
      document.body.classList.add('gold-mode');
      // Burst all cards to 1.15 scale then settle
      cards.forEach(function(c) {
        c.userData.targetScale = 1.2;
        setTimeout(function() { c.userData.targetScale = 1; }, 800);
      });
      // Flash the streetlights bright
      var sl = window._streetLights;
      if (sl) {
        var a = sl.userData.alphas;
        for (var i = 0; i < sl.userData.count; i++) a[i] = 1.0;
        sl.geometry.attributes.alpha.needsUpdate = true;
      }
    }

    function triggerInvertMode() {
      resetAllModes();
      document.body.classList.toggle('invert-mode');
    }

    function onKeyDown(e) {
      if (e.key === 'Escape') { hideOverlay(); resetAllModes(); }
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigateOverlay(1);
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') navigateOverlay(-1);
      if (e.key === 'f' || e.key === 'F') {
        showFPS = !showFPS;
        document.getElementById('fps-counter').classList.toggle('visible', showFPS);
      }

      // Konami code
      if (e.keyCode === konamiSeq[konamiIdx]) {
        konamiIdx++;
        if (konamiIdx === konamiSeq.length) {
          triggerGoldMode();
          konamiIdx = 0;
        }
      } else {
        konamiIdx = 0;
      }

      // Typed word detection
      if (e.key.length === 1) {
        typedBuffer += e.key.toUpperCase();
        if (typedBuffer.length > 20) typedBuffer = typedBuffer.slice(-20);
        if (typedBuffer.endsWith('LATENT')) triggerInvertMode();
      }
    }

    // ========================================
    // 17. VISIBILITY — PAUSE WHEN HIDDEN
    // ========================================
    document.addEventListener('visibilitychange', function() {
      if (document.hidden) {
        clock.stop();
      } else {
        clock.start();
      }
    });

    // ========================================
    // 18. BOOT
    // ========================================
    function init() {
      initScene();
      loadCards();
      initViewToggle();

      var canvas = renderer.domElement;
      canvas.addEventListener('pointerdown', onPointerDown);
      window.addEventListener('pointermove', onPointerMove);
      window.addEventListener('pointerup', onPointerUp);
      canvas.addEventListener('wheel', onWheel, { passive: false });
      canvas.addEventListener('click', onClick);
      document.getElementById('overlay-close').addEventListener('click', function(e) {
        e.stopPropagation();
        hideOverlay();
      });
      document.getElementById('card-overlay').addEventListener('click', function(e) {
        if (e.target === this || e.target === document.getElementById('overlay-img')) hideOverlay();
      });
      document.getElementById('overlay-prev').addEventListener('click', function(e) {
        e.stopPropagation();
        navigateOverlay(-1);
      });
      document.getElementById('overlay-next').addEventListener('click', function(e) {
        e.stopPropagation();
        navigateOverlay(1);
      });
      window.addEventListener('resize', onResize);
      window.addEventListener('keydown', onKeyDown);

      animate();
    }

    init();
  })();
  </script>
</body>
</html>
