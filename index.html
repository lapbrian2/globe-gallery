  <meta name="description" content="Latent Space — an interactive 3D collection of images distributed across a sphere. Drag to orbit, scroll to zoom, click to explore.">
  <meta name="theme-color" content="#09090B">
  <meta property="og:title" content="Latent Space">
  <meta property="og:description" content="An interactive 3D collection. Drag to orbit, scroll to zoom, click to explore.">
  <meta property="og:type" content="website">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:;">

  <style>
    /* ========================================
       RESET
    ======================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

    /* ========================================
       CUSTOM PROPERTIES
    ======================================== */
    :root {
      --ink: #09090B;
      --graphite: #18181B;
      --carbon: #1C1C1E;
      --pewter: #71717A;
      --linen: #F5F5F0;
      --gallery-white: #FAFAF9;
      --gold: #B8964E;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ========================================
       BASE
    ======================================== */
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--ink);
      color: var(--gallery-white);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      cursor: none;
    }

    /* ========================================
       CUSTOM CURSOR
    ======================================== */
    .cursor-dot {
      position: fixed;
      top: 0;
      left: 0;
      width: 6px;
      height: 6px;
      background: var(--gallery-white);
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      will-change: transform;
    }
    .cursor-ring {
      position: fixed;
      top: 0;
      left: 0;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(250,250,249,0.3);
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      will-change: transform;
      transition: width 0.25s ease, height 0.25s ease, border-color 0.25s ease;
    }
    .cursor-ring.hovering {
      width: 56px;
      height: 56px;
      border-color: var(--gold);
    }

    /* ========================================
       LOADING SCREEN
    ======================================== */
    #loader {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .loader-overline {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--pewter);
      margin-bottom: 1.5rem;
    }
    .loader-title {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(2rem, 5vw, 3.5rem);
      color: var(--gallery-white);
      letter-spacing: -0.02em;
      margin-bottom: 3rem;
      animation: loaderPulse 2.5s ease-in-out infinite;
    }
    @keyframes loaderPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .loader-bar {
      width: 160px;
      height: 1px;
      background: rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }
    .loader-fill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0%;
      background: var(--gold);
      transition: width 0.3s ease;
    }
    .loader-pct {
      font-family: var(--font-body);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--pewter);
      margin-top: 1rem;
    }

    /* ========================================
       CANVAS
    ======================================== */
    #canvas-wrap {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    #canvas-wrap canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ========================================
       UI OVERLAY
    ======================================== */
    #ui-overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }
    #ui-overlay > * {
      pointer-events: auto;
    }

    /* Title — top left */
    .title-bar {
      position: fixed;
      top: 2.5rem;
      left: 2.5rem;
      z-index: 20;
    }
    .title-bar .overline {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--pewter);
      margin-bottom: 0.35rem;
    }
    .title-bar h1 {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: 1.4rem;
      letter-spacing: -0.01em;
      color: var(--gallery-white);
    }

    /* Count — top right */
    .image-count {
      position: fixed;
      top: 2.5rem;
      right: 2.5rem;
      z-index: 20;
      text-align: right;
    }
    .image-count .number {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: 1.4rem;
      color: var(--gallery-white);
    }
    .image-count .label {
      font-family: var(--font-body);
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--pewter);
      margin-top: 0.15rem;
    }

    /* View toggle — bottom center */
    .view-toggle {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      gap: 0;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .view-toggle button {
      background: transparent;
      color: var(--pewter);
      border: none;
      padding: 0.6rem 1.5rem;
      font-family: var(--font-body);
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: none;
      transition: color 0.3s ease, background 0.3s ease;
    }
    .view-toggle button + button {
      border-left: 1px solid rgba(184,150,78,0.15);
    }
    .view-toggle button.active {
      color: var(--gallery-white);
      background: rgba(255,255,255,0.04);
    }
    .view-toggle button:hover {
      color: var(--gallery-white);
    }
    .view-toggle button:focus-visible {
      outline: 1px solid var(--gold);
      outline-offset: -1px;
    }

    /* Zoom hint — bottom right */
    .zoom-hint {
      position: fixed;
      bottom: 2.5rem;
      right: 2.5rem;
      z-index: 20;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(113,113,122,0.5);
      opacity: 1;
      transition: opacity 0.6s ease;
    }
    .zoom-hint.faded { opacity: 0; }

    /* FPS — bottom left */
    .fps-counter {
      position: fixed;
      bottom: 2.5rem;
      left: 2.5rem;
      z-index: 20;
      font-family: var(--font-body);
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      color: rgba(113,113,122,0.4);
      display: none;
    }
    .fps-counter.visible { display: block; }

    /* ========================================
       CARD OVERLAY
    ======================================== */
    #card-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(9,9,11,0.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease, visibility 0.5s ease;
      cursor: none;
    }
    #card-overlay.visible {
      opacity: 1;
      visibility: visible;
    }
    #card-overlay img {
      max-width: 75vw;
      max-height: 75vh;
      object-fit: contain;
      opacity: 0;
      transform: scale(0.95);
      transition: opacity 0.5s ease 0.1s, transform 0.5s ease 0.1s;
    }
    #card-overlay.visible img {
      opacity: 1;
      transform: scale(1);
    }
    .overlay-meta {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      display: flex;
      gap: 2rem;
      align-items: center;
    }
    .overlay-meta span {
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--pewter);
    }
    .overlay-close {
      position: absolute;
      top: 2.5rem;
      right: 2.5rem;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--pewter);
      cursor: none;
      background: none;
      border: none;
      font-family: var(--font-body);
      transition: color 0.3s ease;
    }
    .overlay-close:hover { color: var(--gallery-white); }
    .overlay-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--pewter);
      font-size: 1.2rem;
      width: 3rem;
      height: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: none;
      font-family: var(--font-body);
      transition: color 0.3s ease, border-color 0.3s ease;
    }
    .overlay-nav:hover {
      color: var(--gallery-white);
      border-color: var(--gold);
    }
    .overlay-nav:focus-visible {
      outline: 1px solid var(--gold);
      outline-offset: 2px;
    }
    .overlay-prev { left: 2.5rem; }
    .overlay-next { right: 2.5rem; }

    /* ========================================
       SCREEN VIGNETTE
    ======================================== */
    .screen-vignette {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(9,9,11,0.7) 100%);
    }

    /* ========================================
       RESPONSIVE
    ======================================== */
    @media (max-width: 768px) {
      html, body { cursor: auto; }
      .cursor-dot, .cursor-ring { display: none; }
      .title-bar { top: 1.25rem; left: 1.25rem; }
      .image-count { top: 1.25rem; right: 1.25rem; }
      .view-toggle { bottom: 1.25rem; }
      .zoom-hint { display: none; }
      .view-toggle button { cursor: pointer; }
      .overlay-close { cursor: pointer; }
      .overlay-nav { cursor: pointer; }
      .overlay-prev { left: 1rem; }
      .overlay-next { right: 1rem; }
    }

    /* ========================================
       REDUCED MOTION
    ======================================== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

  <div class="cursor-ring" id="cursor-ring"></div>

    <div class="loader-overline">A collection of visions</div>

    }

    // ========================================
    // 3. FIBONACCI SPHERE
    // ========================================
    function fibSphere(i, total, r) {
      var golden = Math.PI * (3 - Math.sqrt(5));
      var y = 1 - (i / (total - 1)) * 2;
      var rAtY = Math.sqrt(1 - y * y);
      var theta = golden * i;
      return new THREE.Vector3(
        Math.cos(theta) * rAtY * r,
        y * r,
        Math.sin(theta) * rAtY * r
      );
    }

    // ========================================
    // 4. GRID POSITIONS
    // ========================================
    function gridPos(i, total) {
      var cols = Math.ceil(Math.sqrt(total * 1.6));
      var spacingX = CARD_W * 1.2;
      var spacingY = CARD_H * 1.25;
      var col = i % cols;
      var row = Math.floor(i / cols);
      var rows = Math.ceil(total / cols);
      var ox = -(cols - 1) * spacingX * 0.5;
      var oy = (rows - 1) * spacingY * 0.5;
      // Stagger odd rows for masonry feel
      var stagger = (row % 2 === 1) ? spacingX * 0.4 : 0;
      return new THREE.Vector3(
        ox + col * spacingX + stagger,
        oy - row * spacingY,
        0
      );
    }

    // ========================================
    // 5. LIQUID DISTORTION SHADER
    // ========================================
    var liquidVertexShader = [
      'uniform float uTime;',
      'uniform float uHover;',
      'varying vec2 vUv;',
      'varying vec3 vWorldPos;',
      '',
      'void main() {',
      '  vUv = uv;',
      '  // Subtle vertex displacement — organic breathing',
      '  vec3 pos = position;',
      '  float wave = sin(pos.x * 4.0 + uTime * 0.8) * cos(pos.y * 3.0 + uTime * 0.6);',
      '  pos.z += wave * 0.02 * (0.3 + uHover * 0.7);',
      '  vec4 worldPos = modelMatrix * vec4(pos, 1.0);',
      '  vWorldPos = worldPos.xyz;',
      '  gl_Position = projectionMatrix * viewMatrix * worldPos;',
      '}'
    ].join('\n');

    var liquidFragmentShader = [
      'uniform sampler2D uTexture;',
      'uniform float uTime;',
      'uniform float uHover;',
      'uniform float uDistortion;',
      'uniform vec3 fogColor;',
      'uniform float fogDensity;',
      'varying vec2 vUv;',
      'varying vec3 vWorldPos;',
      '',
      '// Simple hash for grain',
      'float hash(vec2 p) {',
      '  return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);',
      '}',
      '',
      'void main() {',
      '  vec2 uv = vUv;',
      '',
      '  // Ambient micro-drift (always active, very subtle)',
      '  float drift = sin(uv.y * 6.0 + uTime * 0.4) * 0.002;',
      '  uv.x += drift;',
      '',
      '  // Liquid ripple on hover',
      '  float dist = length(uv - 0.5);',
      '  float ripple = sin(dist * 14.0 - uTime * 3.5) * 0.018 * uHover;',
      '  float wave = sin(uv.y * 10.0 + uTime * 2.0) * 0.010 * uHover;',
      '  float swirl = sin(uv.x * 8.0 - uTime * 1.8) * 0.006 * uHover;',
      '  uv.x += ripple + wave;',
      '  uv.y += ripple * 0.7 + swirl;',
      '',
      '  // Chromatic aberration — stronger on hover',
      '  float shift = 0.001 + 0.004 * uHover;',
      '  float r = texture2D(uTexture, uv + vec2(shift, 0.0)).r;',
      '  float g = texture2D(uTexture, uv).g;',
      '  float b = texture2D(uTexture, uv - vec2(shift, 0.0)).b;',
      '  float a = texture2D(uTexture, uv).a;',
      '',
      '  vec3 col = vec3(r, g, b);',
      '',
      '  // Brightness + contrast boost on hover',
      '  col *= 1.0 + 0.12 * uHover;',
      '  col = mix(col, col * col * (3.0 - 2.0 * col), 0.08 * uHover);',
      '',
      '  // Edge glow — gold tint at card edges on hover',
      '  float edge = smoothstep(0.0, 0.15, min(min(uv.x, 1.0 - uv.x), min(uv.y, 1.0 - uv.y)));',
      '  vec3 goldGlow = vec3(0.722, 0.588, 0.306) * (1.0 - edge) * 0.3 * uHover;',
      '  col += goldGlow;',
      '',
      '  // Film grain — subtle, always present',
      '  float grain = (hash(uv * 500.0 + fract(uTime)) - 0.5) * 0.04;',
      '  col += grain;',
      '',
      '  // Vignette per card',
      '  float vig = 1.0 - dot((uv - 0.5) * 1.2, (uv - 0.5) * 1.2);',
      '  col *= smoothstep(0.0, 0.6, vig);',
      '',
      '  // Fog',
      '  float depth = gl_FragCoord.z / gl_FragCoord.w;',
      '  float fogFactor = 1.0 - exp(-fogDensity * fogDensity * depth * depth);',
      '  col = mix(col, fogColor, fogFactor);',
      '',
      '  gl_FragColor = vec4(col, a);',
      '}'
    ].join('\n');

    // ========================================
    // 6. INIT SCENE
    // ========================================
    function initScene() {
      clock = new THREE.Clock();

      renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: false,
        powerPreference: 'high-performance'
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2));
      renderer.setClearColor(0x09090B, 1);
      renderer.outputEncoding = THREE.sRGBEncoding;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.1;
      document.getElementById('canvas-wrap').appendChild(renderer.domElement);

      scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x09090B, 0.018);

      camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 0, currentZoom);

      _raycaster = new THREE.Raycaster();

      // Lighting — 3-point rig
      scene.add(new THREE.AmbientLight(0xffffff, 0.6));
      var keyLight = new THREE.DirectionalLight(0xfff5e6, 0.5);
      keyLight.position.set(5, 5, 8);
      scene.add(keyLight);
      var fillLight = new THREE.DirectionalLight(0xe6f0ff, 0.2);
      fillLight.position.set(-4, 2, -3);
      scene.add(fillLight);
      // Gold rim — subtle accent from below
      var rimLight = new THREE.PointLight(0xB8964E, 0.3, 20);
      rimLight.position.set(0, -6, 4);
      scene.add(rimLight);
      // Cool rim from above — adds dimension
      var coolRim = new THREE.PointLight(0x4466AA, 0.15, 25);
      coolRim.position.set(-3, 8, -2);
      scene.add(coolRim);

      globeGroup = new THREE.Group();
      scene.add(globeGroup);

      // Wireframe globe skeleton — dim base grid
      var wireGeo = new THREE.IcosahedronGeometry(GLOBE_RADIUS * 0.98, 3);
      var wireMat = new THREE.MeshBasicMaterial({
        color: 0xB8964E,
        wireframe: true,
        transparent: true,
        opacity: 0.03,
        depthWrite: false
      });
      wireframeGlobe = new THREE.Mesh(wireGeo, wireMat);
      globeGroup.add(wireframeGlobe);

      // Streetlight points — bright dots at grid vertices that twinkle
      var lightGeo = new THREE.BufferGeometry();
      var wirePositions = wireGeo.attributes.position.array;
      var lightCount = wireGeo.attributes.position.count;
      // Deduplicate vertices (icosahedron has many shared positions)
      var uniqueMap = {};
      var uniquePositions = [];
      for (var lv = 0; lv < lightCount; lv++) {
        var key = Math.round(wirePositions[lv*3]*100) + ',' +
                  Math.round(wirePositions[lv*3+1]*100) + ',' +
                  Math.round(wirePositions[lv*3+2]*100);
        if (!uniqueMap[key]) {
          uniqueMap[key] = true;
          uniquePositions.push(
            wirePositions[lv*3],
            wirePositions[lv*3+1],
            wirePositions[lv*3+2]
          );
        }
      }
      var lightPosArray = new Float32Array(uniquePositions);
      var lightAlphas = new Float32Array(uniquePositions.length / 3);
      var lightPhases = new Float32Array(uniquePositions.length / 3);
      var lightSpeeds = new Float32Array(uniquePositions.length / 3);
      for (var la = 0; la < lightAlphas.length; la++) {
        lightAlphas[la] = Math.random() * 0.3;
        lightPhases[la] = Math.random() * Math.PI * 2;
        lightSpeeds[la] = 0.5 + Math.random() * 3.0;
      }
      lightGeo.setAttribute('position', new THREE.BufferAttribute(lightPosArray, 3));
      lightGeo.setAttribute('alpha', new THREE.BufferAttribute(lightAlphas, 1));

      var lightMat = new THREE.ShaderMaterial({
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        uniforms: {
          uSize: { value: 4.0 },
          uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) }
        },
        vertexShader: [
          'attribute float alpha;',
          'varying float vAlpha;',
          'uniform float uSize;',
          'uniform float uPixelRatio;',
          'void main() {',
          '  vAlpha = alpha;',
          '  vec4 mvPos = modelViewMatrix * vec4(position, 1.0);',
          '  gl_PointSize = uSize * uPixelRatio * (1.0 / -mvPos.z);',
          '  gl_Position = projectionMatrix * mvPos;',
          '}'
        ].join('\n'),
        fragmentShader: [
          'varying float vAlpha;',
          'void main() {',
          '  // Soft circle falloff',
          '  float d = length(gl_PointCoord - 0.5) * 2.0;',
          '  float glow = 1.0 - smoothstep(0.0, 1.0, d);',
          '  glow *= glow;',
          '  // Gold color with per-point alpha',
          '  vec3 gold = vec3(0.722, 0.588, 0.306);',
          '  vec3 bright = vec3(1.0, 0.92, 0.7);',
          '  vec3 col = mix(gold, bright, vAlpha);',
          '  gl_FragColor = vec4(col, glow * vAlpha);',
          '}'
        ].join('\n')
      });
      var streetLights = new THREE.Points(lightGeo, lightMat);
      streetLights.userData.alphas = lightAlphas;
      streetLights.userData.phases = lightPhases;
      streetLights.userData.speeds = lightSpeeds;
      streetLights.userData.count = lightAlphas.length;
      globeGroup.add(streetLights);
      window._streetLights = streetLights;

      initParticles();
    }

    // ========================================
    // 7. AMBIENT PARTICLES
    // ========================================
    function initParticles() {
      var geo = new THREE.BufferGeometry();
      var positions = new Float32Array(PARTICLE_COUNT * 3);
      var alphas = new Float32Array(PARTICLE_COUNT);
      for (var i = 0; i < PARTICLE_COUNT; i++) {
        positions[i * 3]     = (Math.random() - 0.5) * 30;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 30;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 30;
        alphas[i] = Math.random() * 0.4 + 0.1;
      }
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geo.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));

      var mat = new THREE.PointsMaterial({
        color: 0xFAFAF9,
        size: 0.03,
        transparent: true,
        opacity: 0.35,
        sizeAttenuation: true,
        depthWrite: false
      });
      particleSystem = new THREE.Points(geo, mat);
      scene.add(particleSystem);

      // Second particle layer — gold dust, smaller, closer
      var goldGeo = new THREE.BufferGeometry();
      var goldCount = 120;
      var goldPos = new Float32Array(goldCount * 3);
      for (var gi = 0; gi < goldCount; gi++) {
        goldPos[gi * 3]     = (Math.random() - 0.5) * 20;
        goldPos[gi * 3 + 1] = (Math.random() - 0.5) * 20;
        goldPos[gi * 3 + 2] = (Math.random() - 0.5) * 20;
      }
      goldGeo.setAttribute('position', new THREE.BufferAttribute(goldPos, 3));
      var goldMat = new THREE.PointsMaterial({
        color: 0xB8964E,
        size: 0.025,
        transparent: true,
        opacity: 0.25,
        sizeAttenuation: true,
        depthWrite: false
      });
      var goldParticles = new THREE.Points(goldGeo, goldMat);
      goldParticles.userData.positions = goldPos;
      goldParticles.userData.count = goldCount;
      scene.add(goldParticles);
      window._goldParticles = goldParticles;
    }

    function updateParticles(time) {
      var pos = particleSystem.geometry.attributes.position.array;
      for (var i = 0; i < PARTICLE_COUNT; i++) {
        var idx = i * 3;
        var seed = i * 0.137;
        // Multi-frequency organic drift (curl-like without full curl noise)
        pos[idx]     += Math.cos(time * 0.3 + seed * 7.1) * 0.0008 + Math.sin(time * 0.7 + seed * 3.3) * 0.0003;
        pos[idx + 1] += Math.sin(time * 0.2 + seed * 5.3) * 0.001 + Math.cos(time * 0.5 + seed * 2.1) * 0.0004;
        pos[idx + 2] += Math.sin(time * 0.4 + seed * 4.7) * 0.0005;
        // Wrap particles that drift too far
        if (Math.abs(pos[idx]) > 16) pos[idx] *= -0.8;
        if (Math.abs(pos[idx + 1]) > 16) pos[idx + 1] *= -0.8;
        if (Math.abs(pos[idx + 2]) > 16) pos[idx + 2] *= -0.8;
      }
      particleSystem.geometry.attributes.position.needsUpdate = true;
      particleSystem.rotation.y = time * 0.008;

      // Gold dust layer — slower, dreamier drift
      var gp = window._goldParticles;
      if (gp) {
        var gpos = gp.userData.positions;
        var gc = gp.userData.count;
        for (var gi = 0; gi < gc; gi++) {
          var gidx = gi * 3;
          var gseed = gi * 0.219;
          gpos[gidx]     += Math.sin(time * 0.15 + gseed * 4.3) * 0.0006;
          gpos[gidx + 1] += Math.cos(time * 0.1 + gseed * 3.1) * 0.0008;
          gpos[gidx + 2] += Math.sin(time * 0.2 + gseed * 5.7) * 0.0004;
          if (Math.abs(gpos[gidx]) > 12) gpos[gidx] *= -0.7;
          if (Math.abs(gpos[gidx + 1]) > 12) gpos[gidx + 1] *= -0.7;
          if (Math.abs(gpos[gidx + 2]) > 12) gpos[gidx + 2] *= -0.7;
        }
        gp.geometry.attributes.position.needsUpdate = true;
        gp.rotation.y = -time * 0.005;
      }
    }

    // ========================================
    // 8. LOAD IMAGES AS SHADER CARDS
    // ========================================
    function loadCards() {
      var textureLoader = new THREE.TextureLoader();
      var total = IMAGES.length;

      document.getElementById('count-number').textContent = total;

      IMAGES.forEach(function(src, i) {
        textureLoader.load(src, function(texture) {
          texture.encoding = THREE.sRGBEncoding;
          texture.minFilter = THREE.LinearFilter;
          texture.magFilter = THREE.LinearFilter;

          var aspect = texture.image.width / texture.image.height;
          var w = CARD_W;
          var h = CARD_H;
          if (aspect > 1.2) { h = w / aspect; }
          else if (aspect < 0.8) { w = h * aspect; }

          var geo = new THREE.PlaneGeometry(w, h, 1, 1);

          // Shader material with liquid distortion
          var mat = new THREE.ShaderMaterial({
            uniforms: {
              uTexture: { value: texture },
              uTime: { value: 0 },
              uHover: { value: 0 },
              uDistortion: { value: 0 },
              fogColor: { value: new THREE.Color(0x09090B) },
              fogDensity: { value: 0.018 }
            },
            vertexShader: liquidVertexShader,
            fragmentShader: liquidFragmentShader,
            side: THREE.DoubleSide,
            transparent: true
          });

          var mesh = new THREE.Mesh(geo, mat);

          // Thin gold border — slightly larger plane behind the card
          var borderGeo = new THREE.PlaneGeometry(w + 0.03, h + 0.03);
          var borderMat = new THREE.MeshBasicMaterial({
            color: 0xB8964E,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.15,
            depthWrite: false
          });
          var border = new THREE.Mesh(borderGeo, borderMat);
          border.position.z = -0.005;
          mesh.add(border);

          // Globe position via Fibonacci
          var gp = fibSphere(i, total, GLOBE_RADIUS);
          mesh.position.copy(gp);
          mesh.lookAt(0, 0, 0);
          mesh.rotateY(Math.PI);

          // Unique per-card rotation offset for "hand-placed" feel
          var uniqueAngle = (Math.random() - 0.5) * 0.12;
          mesh.rotateZ(uniqueAngle);

          mesh.userData = {
            index: i,
            src: src,
            globePos: gp.clone(),
            globeQuat: mesh.quaternion.clone(),
            gridPos: gridPos(i, total),
            gridQuat: new THREE.Quaternion(),
            uniqueAngle: uniqueAngle,
            breathOffset: Math.random() * Math.PI * 2,
            breathSpeed: 0.3 + Math.random() * 0.4
          };

          mesh.material.uniforms.uHover.value = 0;
          mesh.scale.set(0.001, 0.001, 0.001);

          // Animation targets (lerped in render loop, no GSAP dependency)
          mesh.userData.targetScale = 0.001;
          mesh.userData.currentScale = 0.001;
          mesh.userData.targetHover = 0;
          mesh.userData.currentHover = 0;
          mesh.userData.revealDelay = 0; // set in onAllLoaded
          mesh.userData.revealTime = 0;

          cards.push(mesh);
          globeGroup.add(mesh);

          loadedCount++;
          var pct = Math.round((loadedCount / total) * 100);
          document.getElementById('loader-fill').style.width = pct + '%';
          document.getElementById('loader-pct').textContent = pct + '%';

          if (loadedCount === total) {
            onAllLoaded();
          }
        }, undefined, function() {
          // Error handler — still count so we don't block onAllLoaded
          loadedCount++;
          var pct = Math.round((loadedCount / total) * 100);
          document.getElementById('loader-fill').style.width = pct + '%';
          document.getElementById('loader-pct').textContent = pct + '%';
          if (loadedCount === total) {
            onAllLoaded();
          }
        });
      });
    }

    // ========================================
    // 9. INTRO SEQUENCE
    // ========================================
    function onAllLoaded() {
      // Hide UI initially
      var uiEls = ['title-bar', 'image-count', 'view-toggle', 'zoom-hint'];
      uiEls.forEach(function(id) {
        var el = document.getElementById(id);
        el.style.opacity = '0';
        el.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
      });

      setTimeout(function() {
        document.getElementById('loader').classList.add('hidden');

        // Dolly camera in
        targetZoom = 14;

        // Set card reveal targets with staggered delays
        var revealStart = performance.now() + 300;
        cards.forEach(function(card, i) {
          card.userData.targetScale = 1;
          card.userData.revealDelay = revealStart + i * 25;
        });

        // Fade in UI via CSS transitions
        setTimeout(function() {
          document.getElementById('title-bar').style.opacity = '1';
        }, 800);
        setTimeout(function() {
          document.getElementById('image-count').style.opacity = '1';
        }, 900);
        setTimeout(function() {
          document.getElementById('view-toggle').style.opacity = '1';
        }, 1000);
        setTimeout(function() {
          document.getElementById('zoom-hint').style.opacity = '1';
        }, 1400);

        introPlayed = true;

        setTimeout(function() {
          document.getElementById('zoom-hint').classList.add('faded');
        }, 6000);
      }, 400);
    }

    // ========================================
    // 10. VIEW MORPHING
    // ========================================
    function morphTo(view) {
      if (isTransitioning || view === currentView) return;
      isTransitioning = true;
      currentView = view;

      var isGlobe = view === 'globe';
      autoSpeed = isGlobe ? AUTO_ROTATE : 0;
      targetZoom = isGlobe ? 14 : 11;

      // Set morph targets on each card
      cards.forEach(function(card, i) {
        var d = card.userData;
        var tp = isGlobe ? d.globePos : d.gridPos;
        var tq = isGlobe ? d.globeQuat : d.gridQuat;
        d.morphTarget = tp.clone();
        d.morphQuat = tq.clone();
        d.morphStartQuat = card.quaternion.clone();
        d.morphT = 0;
        d.morphDelay = performance.now() + Math.random() * 300;
      });

      // Reset globe rotation target
      morphingGlobeRotation = true;

      setTimeout(function() {
        isTransitioning = false;
        morphingGlobeRotation = false;
      }, 2000);
    }

    // ========================================
    // 11. INTERACTION
    // ========================================
    function onPointerDown(e) {
      isDragging = true;
      prevMX = e.clientX;
      prevMY = e.clientY;
      autoSpeed = 0;
    }

    function onPointerMove(e) {
      cursorX = e.clientX;
      cursorY = e.clientY;
      _mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      _mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

      // Mouse parallax targets
      targetParallaxX = _mouse.x * 0.3;
      targetParallaxY = _mouse.y * 0.15;

      if (isDragging && currentView === 'globe') {
        velY = (e.clientX - prevMX) * 0.004;
        velX = (e.clientY - prevMY) * 0.004;
        prevMX = e.clientX;
        prevMY = e.clientY;
      }
    }

    function onPointerUp() {
      isDragging = false;
      if (currentView === 'globe') {
        setTimeout(function() {
          if (!isDragging) autoSpeed = AUTO_ROTATE;
        }, 2500);
      }
    }

    function onWheel(e) {
      e.preventDefault();
      targetZoom += e.deltaY * 0.005;
      targetZoom = Math.max(8, Math.min(30, targetZoom));
    }

    function onClick(e) {
      if (!introPlayed || isTransitioning) return;
      _raycaster.setFromCamera(_mouse, camera);
      var hits = _raycaster.intersectObjects(cards);
      if (hits.length > 0) {
        showOverlay(hits[0].object.userData);
      }
    }

    // ========================================
    // 12. OVERLAY
    // ========================================
    function showOverlay(data) {
      overlayIndex = data.index;
      var overlay = document.getElementById('card-overlay');
      document.getElementById('overlay-img').src = data.src;
      document.getElementById('overlay-index').textContent =
        (overlayIndex + 1) + ' / ' + IMAGES.length;
      overlay.classList.add('visible');
    }

    function hideOverlay() {
      document.getElementById('card-overlay').classList.remove('visible');
      overlayIndex = -1;
    }

    function navigateOverlay(dir) {
      if (overlayIndex < 0) return;
      overlayIndex = (overlayIndex + dir + IMAGES.length) % IMAGES.length;
      var img = document.getElementById('overlay-img');
      // Crossfade transition
      img.style.transition = 'opacity 0.2s ease';
      img.style.opacity = '0';
      setTimeout(function() {
        img.src = IMAGES[overlayIndex];
        img.onload = function() {
          img.style.opacity = '1';
          img.onload = null;
        };
      }, 200);
      document.getElementById('overlay-index').textContent =
        (overlayIndex + 1) + ' / ' + IMAGES.length;
    }

    // ========================================
    // 13. RENDER LOOP
    // ========================================
    var frames = 0, fpsTime = 0;

    function animate() {
      requestAnimationFrame(animate);

      var delta = clock.getDelta();
      var time = clock.elapsedTime;

      // FPS counter
      frames++;
      fpsTime += delta;
      if (fpsTime >= 1) {
        if (showFPS) {
          document.getElementById('fps-counter').textContent = frames + ' FPS';
        }
        frames = 0;
        fpsTime = 0;
      }

      // Smooth zoom
      currentZoom += (targetZoom - currentZoom) * 0.07;
      camera.position.z = currentZoom;

      // Mouse parallax — subtle scene tilt
      parallaxX += (targetParallaxX - parallaxX) * 0.03;
      parallaxY += (targetParallaxY - parallaxY) * 0.03;
      camera.position.x = parallaxX;
      camera.position.y = parallaxY;

      if (currentView === 'globe') {
        // Auto-rotate
        globeGroup.rotation.y += autoSpeed;

        // Drag — apply rotation always, dampen when released
        globeGroup.rotation.y += velY;
        globeGroup.rotation.x += velX;
        if (!isDragging) {
          velY *= DAMPING;
          velX *= DAMPING;
        }

        // Card breathing — multi-frequency organic float
        if (!isTransitioning) {
          for (var i = 0; i < cards.length; i++) {
            var c = cards[i];
            var d = c.userData;
            var t1 = time * d.breathSpeed + d.breathOffset;
            var t2 = time * d.breathSpeed * 0.7 + d.breathOffset * 1.3;
            var breathY = Math.sin(t1) * 0.05 + Math.sin(t2 * 1.6) * 0.02;
            var breathX = Math.cos(t1 * 0.8) * 0.03;
            var breathZ = Math.sin(t2) * 0.02;
            c.position.x = d.globePos.x + breathX;
            c.position.y = d.globePos.y + breathY;
            c.position.z = d.globePos.z + breathZ;
          }
        }
      }

      // Lerp globe rotation toward zero during morph
      if (morphingGlobeRotation) {
        globeGroup.rotation.x += (0 - globeGroup.rotation.x) * 0.06;
        globeGroup.rotation.y += (0 - globeGroup.rotation.y) * 0.06;
        globeGroup.rotation.z += (0 - globeGroup.rotation.z) * 0.06;
      }

      // Morph card positions/quaternions toward targets
      if (isTransitioning) {
        for (var m = 0; m < cards.length; m++) {
          var mc = cards[m];
          var md = mc.userData;
          if (md.morphTarget && performance.now() >= md.morphDelay) {
            md.morphT = Math.min(md.morphT + 0.04, 1);
            mc.position.lerp(md.morphTarget, 0.06);
            mc.quaternion.slerp(md.morphQuat, 0.06);
          }
        }
      }

      // Lerp scale, hover, and update shader uniforms
      var now = performance.now();
      for (var j = 0; j < cards.length; j++) {
        var c = cards[j];
        var d = c.userData;

        // Staggered reveal — don't start lerping until delay passed
        if (now >= d.revealDelay && d.targetScale > d.currentScale) {
          d.currentScale += (d.targetScale - d.currentScale) * 0.08;
          if (d.targetScale - d.currentScale < 0.001) d.currentScale = d.targetScale;
        }

        // Hover lerp
        d.currentHover += (d.targetHover - d.currentHover) * 0.1;

        c.scale.set(d.currentScale, d.currentScale, d.currentScale);
        c.material.uniforms.uHover.value = d.currentHover;
        c.material.uniforms.uTime.value = time;
        // Brighten gold border on hover
        if (c.children[0]) {
          c.children[0].material.opacity = 0.1 + d.currentHover * 0.4;
        }
      }

      // Hover detection
      _raycaster.setFromCamera(_mouse, camera);
      var intersects = _raycaster.intersectObjects(cards);

      if (hoveredCard && (!intersects.length || intersects[0].object !== hoveredCard)) {
        hoveredCard.userData.targetScale = 1;
        hoveredCard.userData.targetHover = 0;
        cursorRing.classList.remove('hovering');
        hoveredCard = null;
      }

      if (intersects.length > 0 && !isTransitioning && introPlayed) {
        var target = intersects[0].object;
        if (target !== hoveredCard) {
          hoveredCard = target;
          hoveredCard.userData.targetScale = 1.12;
          hoveredCard.userData.targetHover = 1;
          cursorRing.classList.add('hovering');
        }
      }

      // Wireframe globe — subtle base grid
      if (wireframeGlobe) {
        wireframeGlobe.material.opacity = 0.025 + Math.sin(time * 0.3) * 0.01;
        wireframeGlobe.rotation.y = time * 0.012;
        wireframeGlobe.rotation.x = Math.sin(time * 0.1) * 0.03;
      }

      // Streetlights — twinkle like city lights from space
      var sl = window._streetLights;
      if (sl) {
        var slAlphas = sl.userData.alphas;
        var slPhases = sl.userData.phases;
        var slSpeeds = sl.userData.speeds;
        var slCount = sl.userData.count;
        for (var si = 0; si < slCount; si++) {
          // Each light has its own rhythm — some fast blink, some slow glow
          var pulse = Math.sin(time * slSpeeds[si] + slPhases[si]);
          var sharp = pulse * pulse * pulse; // cubic falloff — bright peak, long dim
          // Random bright spikes — ~5% chance per frame of flaring
          var spike = Math.sin(time * 7.3 + si * 2.17) * Math.cos(time * 4.1 + si * 1.53);
          var flare = spike > 0.92 ? 1.0 : 0.0;
          slAlphas[si] = Math.max(0.02, sharp * 0.5 + flare * 0.8);
        }
        sl.geometry.attributes.alpha.needsUpdate = true;
        // Use the alpha attribute via size — brighter lights appear bigger
        var slSizes = sl.geometry.attributes.position.array;
        sl.material.size = 0.07 + Math.sin(time * 0.6) * 0.01;
      }

      // Particles
      updateParticles(time);

      // Cursor
      updateCursor();

      renderer.render(scene, camera);
    }

    // ========================================
    // 14. RESIZE
    // ========================================
    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // ========================================
    // 15. VIEW TOGGLE
    // ========================================
    function initViewToggle() {
      var btns = document.querySelectorAll('.view-toggle button');
      btns.forEach(function(btn) {
        btn.addEventListener('click', function() {
          var v = this.getAttribute('data-view');
          btns.forEach(function(b) { b.classList.remove('active'); });
          this.classList.add('active');
          morphTo(v);
        });
      });
    }

    // ========================================
    // 16. KEYBOARD
    // ========================================
    function onKeyDown(e) {
      if (e.key === 'Escape') hideOverlay();
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigateOverlay(1);
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') navigateOverlay(-1);
      if (e.key === 'f' || e.key === 'F') {
        showFPS = !showFPS;
        document.getElementById('fps-counter').classList.toggle('visible', showFPS);
      }
    }

    // ========================================
    // 17. VISIBILITY — PAUSE WHEN HIDDEN
    // ========================================
    document.addEventListener('visibilitychange', function() {
      if (document.hidden) {
        clock.stop();
      } else {
        clock.start();
      }
    });

    // ========================================
    // 18. BOOT
    // ========================================
    function init() {
      initScene();
      loadCards();
      initViewToggle();

      var canvas = renderer.domElement;
      canvas.addEventListener('pointerdown', onPointerDown);
      window.addEventListener('pointermove', onPointerMove);
      window.addEventListener('pointerup', onPointerUp);
      canvas.addEventListener('wheel', onWheel, { passive: false });
      canvas.addEventListener('click', onClick);
      document.getElementById('overlay-close').addEventListener('click', function(e) {
        e.stopPropagation();
        hideOverlay();
      });
      document.getElementById('card-overlay').addEventListener('click', function(e) {
        if (e.target === this || e.target === document.getElementById('overlay-img')) hideOverlay();
      });
      document.getElementById('overlay-prev').addEventListener('click', function(e) {
        e.stopPropagation();
        navigateOverlay(-1);
      });
      document.getElementById('overlay-next').addEventListener('click', function(e) {
        e.stopPropagation();
        navigateOverlay(1);
      });
      window.addEventListener('resize', onResize);
      window.addEventListener('keydown', onKeyDown);

      animate();
    }

    init();
  })();
  </script>
</body>
</html>
